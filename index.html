<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>健康状态</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f6;
      --panel: #ffffff;
      --ink: #18232d;
      --muted: #65717e;
      --line: #dce3e7;
      --soft: #f1f4f3;
      --good: #2f8f68;
      --steady: #3977a8;
      --active: #d47a3c;
      --warning: #bd594d;
      --neutral: #7b8794;
      --deep: #2e6f9f;
      --light: #7eb6cc;
      --rem: #8b73b7;
      --awake: #d49a2d;
      --shadow: 0 14px 34px rgba(24, 34, 43, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.42;
    }

    .page {
      width: min(880px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.12;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtle,
    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      border-color: #1f6f54;
      background: #1f6f54;
      color: #fff;
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .token-panel {
      display: none;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .token-panel.visible {
      display: block;
    }

    .token-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      margin-top: 9px;
    }

    input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: #fff;
    }

    .status-line {
      min-height: 20px;
      margin: 6px 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 15px 16px 0;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px 16px 14px;
      border-bottom: 1px solid var(--line);
    }

    .summary-item {
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fbfcfc;
    }

    .summary-label,
    .metric-label,
    .activity-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 760;
    }

    .day-list {
      display: grid;
      gap: 12px;
      padding: 14px 16px 16px;
    }

    .day-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfc;
      overflow: hidden;
    }

    .day-card.latest {
      background: #fff;
      border-color: #cdd8df;
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 12px 0;
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .day-date {
      font-size: 17px;
      font-weight: 780;
      line-height: 1.2;
    }

    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      color: #4d5965;
      background: #e4e9ed;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .badge.good {
      color: #226044;
      background: #dcefe6;
    }

    .badge.steady {
      color: #285b84;
      background: #dfeaf3;
    }

    .badge.active {
      color: #82481f;
      background: #f1dccb;
    }

    .badge.warning {
      color: #7d332d;
      background: #f0d5d2;
    }

    .badge.period {
      color: #7a3f5d;
      background: #f1dce8;
    }

    .headline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .day-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fff;
    }

    .metric-value {
      margin-top: 4px;
      font-size: 16px;
      line-height: 1.18;
      font-weight: 760;
    }

    .metric-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .sleep-stage {
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fff;
    }

    .stage-bar {
      display: flex;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft);
    }

    .stage-segment {
      min-width: 2px;
    }

    .stage-segment.deep {
      background: var(--deep);
    }

    .stage-segment.light {
      background: var(--light);
    }

    .stage-segment.rem {
      background: var(--rem);
    }

    .stage-segment.awake {
      background: var(--awake);
    }

    .stage-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .stage-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 3px;
      margin-right: 5px;
      vertical-align: 1px;
      background: var(--neutral);
    }

    .stage-dot.deep {
      background: var(--deep);
    }

    .stage-dot.light {
      background: var(--light);
    }

    .stage-dot.rem {
      background: var(--rem);
    }

    .stage-dot.awake {
      background: var(--awake);
    }

    .activity-section {
      display: grid;
      gap: 8px;
    }

    .section-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
    }

    .activity-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .activity-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .activity-heading {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .activity-title {
      font-size: 16px;
      font-weight: 780;
      line-height: 1.2;
    }

    .activity-time {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .activity-type {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .activity-stat {
      min-height: 46px;
      border-radius: 7px;
      background: var(--soft);
      padding: 7px;
    }

    .activity-value {
      margin-top: 2px;
      font-size: 14px;
      font-weight: 760;
      line-height: 1.18;
    }

    .empty {
      color: var(--muted);
      border-radius: 8px;
      background: var(--soft);
      padding: 10px;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 20px, 620px);
        padding-top: 16px;
      }

      header {
        display: block;
      }

      .actions {
        justify-content: flex-start;
        margin-top: 10px;
      }

      .token-row,
      .summary-strip,
      .metric-grid,
      .activity-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .day-top {
        display: block;
      }

      .day-top .meta {
        margin-top: 6px;
      }

      h1 {
        font-size: 24px;
      }
    }

    @media (max-width: 460px) {
      .summary-strip,
      .metric-grid,
      .activity-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>健康状态</h1>
        <div class="subtle" id="rangeText">每天早晨更新</div>
      </div>
      <div class="actions">
        <button id="refreshButton" type="button">重新读取</button>
        <button id="tokenToggleButton" type="button">Token</button>
      </div>
    </header>

    <section class="token-panel" id="tokenPanel">
      <div class="subtle">Token 只保存在这个浏览器里，用来读取私有数据仓库。</div>
      <div class="token-row">
        <input id="tokenInput" type="password" autocomplete="off" placeholder="GitHub fine-grained token">
        <button class="primary" id="saveTokenButton" type="button">保存</button>
        <button id="clearTokenButton" type="button">清除</button>
      </div>
    </section>

    <div class="status-line" id="statusLine"></div>

    <section class="panel" id="content" aria-label="每日状态" hidden>
      <div class="panel-head">
        <h2>每日状态</h2>
        <div class="meta" id="updatedText"></div>
      </div>
      <div class="summary-strip" id="summaryStrip"></div>
      <div class="day-list" id="dayList"></div>
    </section>
  </main>

  <script>
    const CONFIG = {
      owner: "yihuhou",
      repo: "mom-health-data",
      path: "mom-health-summary.json",
      ref: "main"
    };
    const TOKEN_KEY = "mom-health.github-token.v1";

    const els = {
      tokenPanel: document.getElementById("tokenPanel"),
      tokenInput: document.getElementById("tokenInput"),
      saveTokenButton: document.getElementById("saveTokenButton"),
      clearTokenButton: document.getElementById("clearTokenButton"),
      tokenToggleButton: document.getElementById("tokenToggleButton"),
      refreshButton: document.getElementById("refreshButton"),
      statusLine: document.getElementById("statusLine"),
      content: document.getElementById("content"),
      rangeText: document.getElementById("rangeText"),
      updatedText: document.getElementById("updatedText"),
      summaryStrip: document.getElementById("summaryStrip"),
      dayList: document.getElementById("dayList")
    };

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function toneClass(tone) {
      return ["good", "steady", "active", "warning"].includes(tone) ? tone : "";
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("zh-CN", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function getStoredToken() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function setBusy(isBusy) {
      els.refreshButton.disabled = isBusy;
      els.saveTokenButton.disabled = isBusy;
    }

    function showTokenPanel(show) {
      els.tokenPanel.classList.toggle("visible", show);
      if (show) {
        els.tokenInput.value = getStoredToken();
        window.setTimeout(function () { els.tokenInput.focus(); }, 0);
      }
    }

    async function fetchHealthData(token) {
      const url = "https://api.github.com/repos/" + CONFIG.owner + "/" + CONFIG.repo + "/contents/" + encodeURIComponent(CONFIG.path) + "?ref=" + encodeURIComponent(CONFIG.ref) + "&_=" + Date.now();
      const response = await fetch(url, {
        cache: "no-store",
        headers: {
          "Accept": "application/vnd.github.raw+json",
          "Authorization": "Bearer " + token,
          "X-GitHub-Api-Version": "2022-11-28"
        }
      });

      if (!response.ok) {
        throw new Error("GitHub 返回 " + response.status);
      }

      const text = await response.text();
      const parsed = JSON.parse(text);
      if (parsed && parsed.encoding === "base64" && parsed.content) {
        const binary = atob(parsed.content.replace(/\s/g, ""));
        const bytes = Uint8Array.from(binary, function (char) { return char.charCodeAt(0); });
        return JSON.parse(new TextDecoder("utf-8").decode(bytes));
      }
      return parsed;
    }

    function renderSummary(data) {
      const totals = data.totals || {};
      const items = [
        ["平均睡眠", totals.avgSleepText],
        ["日均步数", totals.avgStepsText],
        ["运动时间", totals.exerciseText],
        ["运动记录", (totals.activityCount || 0) + " 条"]
      ];
      els.summaryStrip.innerHTML = items.map(function (item) {
        return '<div class="summary-item">' +
          '<div class="summary-label">' + escapeHtml(item[0]) + '</div>' +
          '<div class="summary-value">' + escapeHtml(item[1] || "暂无") + '</div>' +
          '</div>';
      }).join("");
    }

    function renderStages(stages) {
      if (!stages || !stages.length) {
        return '<div class="empty">暂无睡眠成分。</div>';
      }
      const segments = stages.map(function (stage) {
        return '<span class="stage-segment ' + escapeHtml(stage.key) + '" style="width:' + Math.max(stage.percent, 1) + '%"></span>';
      }).join("");
      const legend = stages.map(function (stage) {
        return '<span><span class="stage-dot ' + escapeHtml(stage.key) + '"></span>' + escapeHtml(stage.label) + ' ' + escapeHtml(stage.percent) + '%</span>';
      }).join("");
      return '<div class="sleep-stage">' +
        '<div class="stage-bar">' + segments + '</div>' +
        '<div class="stage-legend">' + legend + '</div>' +
        '</div>';
    }

    function renderMetric(label, value, note) {
      return '<div class="metric">' +
        '<div class="metric-label">' + escapeHtml(label) + '</div>' +
        '<div class="metric-value">' + escapeHtml(value) + '</div>' +
        '<div class="metric-note">' + escapeHtml(note || "") + '</div>' +
        '</div>';
    }

    function renderActivityStat(label, value) {
      return '<div class="activity-stat">' +
        '<div class="activity-label">' + escapeHtml(label) + '</div>' +
        '<div class="activity-value">' + escapeHtml(value) + '</div>' +
        '</div>';
    }

    function renderActivities(day) {
      if (!day.activities || !day.activities.length) {
        return '<div class="activity-section"><div class="section-title">运动记录</div><div class="empty">这一天没有单独运动记录。</div></div>';
      }

      const records = day.activities.map(function (activity) {
        const stats = [
          ["时长", activity.durationText],
          ["距离", activity.distanceText],
          ["负荷", activity.trainingLoadText],
          ["体感", activity.perceivedEffortText],
          ["平均心率", activity.avgHeartRateText],
          ["爬升/下降", activity.elevationText],
          ["消耗", activity.caloriesText],
          ["训练效果", activity.trainingEffectText]
        ].map(function (item) {
          return renderActivityStat(item[0], item[1] || "暂无");
        }).join("");

        return '<article class="activity-card">' +
          '<div class="activity-top">' +
            '<div class="activity-heading">' +
              '<div class="activity-title">' + escapeHtml(activity.title) + '</div>' +
              '<div class="activity-time">' + escapeHtml(activity.timeText || "暂无时段") + '</div>' +
            '</div>' +
            '<div class="activity-type">' + escapeHtml(activity.type) + '</div>' +
          '</div>' +
          '<div class="activity-grid">' + stats + '</div>' +
          '</article>';
      }).join("");

      return '<div class="activity-section"><div class="section-title">运动记录</div>' + records + '</div>';
    }

    function renderDay(day, index) {
      const cls = toneClass(day.status && day.status.tone);
      const latestClass = index === 0 ? " latest" : "";
      const extraBadge = day.menstrualTag
        ? '<span class="badge period">' + escapeHtml(day.menstrualTag.label) + '</span>'
        : "";
      const metrics = [
        renderMetric("睡眠", day.sleep.durationText, (day.sleep.window || "暂无睡眠时间") + " · " + day.sleep.scoreText + " · " + day.sleep.awakeText + " · 午睡 " + (day.sleep.napText || "暂无")),
        renderMetric("HRV", day.vitals.hrvText, day.vitals.hrvNote || "睡眠 HRV"),
        renderMetric("静息心率", day.vitals.restingText, "恢复 " + day.vitals.recoveryText + " · 负荷比 " + day.vitals.loadRatioText),
        renderMetric("日间活动", day.activity.stepsText, day.activity.exerciseText + " · " + day.activity.activeCaloriesText)
      ].join("");

      return '<article class="day-card' + latestClass + '">' +
        '<div class="day-top">' +
          '<div>' +
            '<div class="day-title">' +
              '<span class="day-date">' + escapeHtml(day.label) + '</span>' +
              '<span class="badge ' + cls + '">' + escapeHtml(day.status.label) + '</span>' +
              extraBadge +
            '</div>' +
            '<div class="headline">' + escapeHtml(day.status.headline) + '</div>' +
          '</div>' +
          '<div class="meta">' + escapeHtml(day.date) + '</div>' +
        '</div>' +
        '<div class="day-body">' +
          '<div class="metric-grid">' + metrics + '</div>' +
          renderStages(day.sleep.stages) +
          renderActivities(day) +
        '</div>' +
        '</article>';
    }

    function render(data) {
      const days = data.days || [];
      if (!Array.isArray(days) || !days.length) {
        els.content.hidden = true;
        els.statusLine.textContent = "读到了旧版数据，请点重新读取或稍后刷新。";
        return;
      }
      els.content.hidden = false;
      els.rangeText.textContent = (data.updateCadence || "每天早晨更新") + " · " + data.dateRange.label;
      els.updatedText.textContent = "生成于 " + formatDateTime(data.generatedAt);
      renderSummary(data);
      els.dayList.innerHTML = days.map(renderDay).join("");
    }

    async function load() {
      const token = getStoredToken();
      if (!token) {
        els.statusLine.textContent = "需要先保存 Token。";
        els.content.hidden = true;
        showTokenPanel(true);
        return;
      }

      try {
        setBusy(true);
        els.statusLine.textContent = "正在读取数据...";
        const data = await fetchHealthData(token);
        render(data);
        els.statusLine.textContent = "";
        showTokenPanel(false);
      } catch (error) {
        els.content.hidden = true;
        els.statusLine.textContent = "读取失败：" + error.message;
        showTokenPanel(true);
      } finally {
        setBusy(false);
      }
    }

    els.tokenToggleButton.addEventListener("click", function () {
      showTokenPanel(!els.tokenPanel.classList.contains("visible"));
    });

    els.refreshButton.addEventListener("click", load);

    els.saveTokenButton.addEventListener("click", function () {
      const token = els.tokenInput.value.trim();
      if (token) {
        localStorage.setItem(TOKEN_KEY, token);
      }
      load();
    });

    els.clearTokenButton.addEventListener("click", function () {
      localStorage.removeItem(TOKEN_KEY);
      els.tokenInput.value = "";
      els.content.hidden = true;
      els.statusLine.textContent = "Token 已清除。";
      showTokenPanel(true);
    });

    load();
  </script>
</body>
</html>
